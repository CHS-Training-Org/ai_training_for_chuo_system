# ============================================================================
# BookFlow ドキュメントサイト設定
# ============================================================================

[project]
site_name = "BookFlow ドキュメント"
site_description = "社内 AI 駆動開発チュートリアル「BookFlow」の設計・学習ドキュメント"
site_author = "Bizarress"
site_url = "https://bizarress.github.io/AI-Development-Tutorial/"
copyright = "Copyright &copy; 2026 中央システム"

# docs_dir はリポジトリルートからの相対パス（Zensical issue #68 参照）
docs_dir = "Docs"
site_dir = "site"

# 追加スタイルシート（docs_dir からの相対）。デザインショーケース（design.md）用。
extra_css = ["stylesheets/design-showcase.css"]

# リポジトリリンク（ページ右上に GitHub アイコンが表示される）
repo_url = "https://github.com/Bizarress/AI-Development-Tutorial"
repo_name = "Bizarress/AI-Development-Tutorial"

nav = [
  { "ホーム" = "index.md" },
  { "アーキテクチャ" = "ARCHITECTURE.md" },
  { "デザイン" = "design.md" },
  { "計画 (Plan)" = [
    "plan/PHASE4_AI_DRIVEN_DEV_TASKS.md",
  ] },
  { "設計判断 (ADR)" = [
    "decision/ADR-001-frontend-package-manager.md",
