services:
  frontend:
    image: node:24-slim
    working_dir: /workspace/frontend
    volumes:
      - ..:/workspace:cached
      - frontend-node-modules:/workspace/frontend/node_modules
      - pnpm-store:/pnpm-store
      # ホストの Claude Code 設定/認証をコンテナへ共有する。
      # devcontainer.json の mounts(短縮形)では Windows のドライブレター(C:)を含むパスが
      # 'C:\...:/root/...:rw' に変換され、Docker のボリューム parser が ':' で誤分割して
      # 「invalid volume specification」で起動失敗する。long-form は source/target を別キーに
      # 分けるため ':' の曖昧さがなく回避できる（VS Code 公式が compose 構成で推奨する方式）。
      # NOTE: ${USERPROFILE} は Windows ホスト前提（devcontainer.json の initializeCommand も
      # Windows 依存で、マウント前にホスト側へ .claude / .claude.json を事前生成している）。
      - type: bind
        source: ${USERPROFILE}/.claude
        target: /root/.claude
      - type: bind
        source: ${USERPROFILE}/.claude.json
        target: /root/.claude.json
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    command: sleep infinity

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bookflow
      POSTGRES_USER: bookflow
      POSTGRES_PASSWORD: bookflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookflow -d bookflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,dynamodb
      DEFAULT_REGION: ap-northeast-1
    volumes:
      - localstack-data:/var/lib/localstack

  cognito-local:
    # バージョン固定: DB ファイル直接シード方式の互換性を維持するため digest で固定。
    # scripts/provision-cognito.sh はこのバージョンのファイルフォーマットを前提とする。
    image: jagregory/cognito-local@sha256:a5ad30d01da5016a38535a717f6e1642d1b37f886a7b17e90b67f6e5ad134831
    ports:
      - "9229:9229"
    volumes:
      - cognito-data:/app/.cognito

  backend:
    image: eclipse-temurin:25-jdk
    working_dir: /workspace/backend
    volumes:
      - ..:/workspace:cached
      - gradle-cache:/root/.gradle
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bookflow
      DB_USERNAME: bookflow
      DB_PASSWORD: bookflow
      COGNITO_JWKS_URI: http://cognito-local:9229/local_user_pool_id/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
    # bootRun は dev コンテナ内で手動実行する（cd /workspace/backend && ./gradlew bootRun）。
    # backend と frontend の両コンテナが /workspace/backend/.gradle を共有しているため、
    # ここで Gradle を自動起動すると dev コンテナ側の Gradle コマンドとロック競合する。
    command: sleep infinity

  docs:
    image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      # .venv を 9p バインドマウントから逃がし、高速な ext4 ボリュームに配置する
      # （9p 上だと uv sync が極端に遅く、rm -rf も不安定で構成が止まるため）
      - docs-venv:/workspace/.venv
    ports:
      - "8000:8000"
    environment:
      UV_LINK_MODE: copy
      # pnpm install が node_modules 再作成の確認待ち(非TTY)で止まるのを防ぐ
      CI: "true"
      # CI=true によるカラー抑制を上書きし、Claude Code 等の CLI ツールで色付き表示を維持する
      FORCE_COLOR: "1"
    # 9p マウントでは inotify が効かず zensical serve の自動再ビルドが動かないため、
    # mtime ポーリングで再ビルドするスクリプト経由で起動する（詳細は docs-watch.sh）。
    command: sh /workspace/.devcontainer/docs-watch.sh

volumes:
  postgres-data:
  localstack-data:
  cognito-data:
  frontend-node-modules:
  pnpm-store:
  docs-venv:
  gradle-cache:
