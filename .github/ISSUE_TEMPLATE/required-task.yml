name: 必須課題（STEP）
description: 新人が STEP-01〜05 等の必須課題に取り組む際の起票用テンプレートです。
title: "[STEP-XX] "
labels:
  - 課題
body:
  - type: markdown
    attributes:
      value: |
        対応する要件ドキュメント（`Docs/guide/curriculum.md` の該当 STEP、または `Docs/spec/enhancements/<課題>.md`）を先に読んでから記入してください。
        **受入条件・完了条件はドキュメント側が真実の源です**。本 Issue では概要のみを記載し、二重管理しないようにしてください。
  - type: input
    id: requirement-doc
    attributes:
      label: 対応する要件ドキュメントへのリンク
      description: "`Docs/guide/curriculum.md` の該当 STEP セクション、または `Docs/spec/enhancements/<課題>.md` へのパス・リンクを記載してください。"
      placeholder: "例：Docs/guide/curriculum.md#step-01"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: ゴール
      description: この課題で達成すること（何ができるようになるか）を記載してください。
    validations:
      required: true
  - type: textarea
    id: prerequisites
    attributes:
      label: 前提条件
      description: 着手前に完了しておくべき課題・準備があれば記載してください。
    validations:
      required: false
  - type: textarea
    id: done-conditions
    attributes:
      label: 完了条件
      description: |
        詳細な受入条件は対応する要件ドキュメント側を参照してください（本 Issue には再掲しません）。
        ここでは、レビュー依頼前に自分で確認するチェック項目を簡潔に記載してください。
    validations:
      required: true
  - type: textarea
    id: ai-hints
    attributes:
      label: AI活用ヒント
      description: Claude Code の plan mode や `/update-spec` スキル等、活用が想定される場面のヒントがあれば記載してください。
    validations:
      required: false
  - type: dropdown
    id: estimate
    attributes:
      label: 推定工数
      description: 目安となる作業時間を選択してください。
      options:
        - 半日
        - 1日
        - 2〜3日
        - 1週間以上
    validations:
      required: true
