name: Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  trivy:
    name: trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy vulnerability scan (依存関係の既知脆弱性)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Run Trivy misconfiguration scan (設定ファイルの既知の問題・参考情報)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
