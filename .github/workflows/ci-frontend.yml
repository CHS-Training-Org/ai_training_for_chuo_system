name: CI Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # frontend/pnpm-workspace.yaml の storeDir: /pnpm-store は devcontainer 専用設計
      # （named volume を /pnpm-store にマウントする前提。.devcontainer/docker-compose.yml 参照）。
      # GitHub Actions の ubuntu-latest ランナーには /pnpm-store が存在せず、非 root ユーザーは
      # ルート直下への mkdir 権限を持たないため EACCES で失敗する。pnpm-workspace.yaml の設定は
      # 環境変数 PNPM_CONFIG_STORE_DIR で上書きできる（.npmrc では上書きできない・CLI引数は
      # コマンドごとに指定が必要なためジョブ全体に効く環境変数を使う）。devcontainer側の設定は
      # そのまま維持する。
      PNPM_CONFIG_STORE_DIR: ${{ runner.temp }}/pnpm-store

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
