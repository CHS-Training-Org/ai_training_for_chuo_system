name: CI Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        # frontend/pnpm-workspace.yaml の storeDir: /pnpm-store は devcontainer 専用設計
        # （named volume を /pnpm-store にマウントする前提。.devcontainer/docker-compose.yml 参照）。
        # GitHub Actions の ubuntu-latest ランナーには /pnpm-store が存在せず、非 root ユーザーは
        # ルート直下への mkdir 権限を持たないため EACCES で失敗する。CI 実行時のみ書き込み可能な
        # runner.temp 配下へ store-dir を上書きし、devcontainer 側の設定はそのまま維持する。
        run: pnpm install --frozen-lockfile --store-dir "${{ runner.temp }}/pnpm-store"

      - name: Lint
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
