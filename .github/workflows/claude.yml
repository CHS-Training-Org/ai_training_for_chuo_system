name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # @claude を含むイベントのみ起動（無駄な実行・課金を防ぐ）。「@claude pr-review」は claude-review ジョブの専管とし、二重起動を避ける
    # （Issue コメントでは pull_request が null になるため、PR コメントのときだけ除外する。plain Issue に「@claude pr-review」と書かれた場合はこの claude ジョブが処理する）
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !(github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude pr-review'))) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude pr-review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude pr-review')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # 修正コミットを可能にする
      pull-requests: write # PR へコメント投稿
      issues: write # Issue へコメント投稿
      id-token: write # OIDC（必須権限）
      actions: read # CI 結果の参照

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  claude-review:
    # 「@claude pr-review」というPRコメントでのみ起動するAI一次レビュー専用ジョブ（ADR-024）。非ブロッキングの参考コメントで、コード変更・コミットは行わない
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude pr-review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude pr-review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude pr-review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read # コードの変更・コミットは行わない
      pull-requests: write # レビューコメント投稿のみ
      id-token: write # OIDC（必須権限）

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            レビュー対象の PR 番号は #${{ github.event.issue.number || github.event.pull_request.number }} です。
            現在のチェックアウトは main のため、`gh pr view` / `gh pr diff` / `gh pr comment` は必ずこの番号を
            指定して実行してください（番号なしでは対象 PR を特定できません。git branch や gh pr list による
            探索、env の参照は不要です）。

            この PR を一次レビューしてください。レビュー観点・出力方針は
            `.github/workflows/references/pr-review-rubric.md` に定義されているので、まずこのファイルを
            Read で読み、そこに書かれている内容に従ってレビューしてください。
          claude_args: |
            --model claude-opus-4-8
            --effort high
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"
